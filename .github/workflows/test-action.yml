name: Test Action (Integration)

on: [push, pull_request]

permissions:
  contents: read

jobs:

  # Istanbul (Jest / NYC / Istanbul)
  test-istanbul:
    name: 'istanbul — Jest / NYC'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Install dependencies and generate coverage
        run: npm ci && npm test

      - name: Copy test README template
        run: cp tests/data/test-readme-template.md /tmp/test-readme.md

      - name: Run action
        uses: ./
        with:
          format: istanbul
          coverage-file-path: ./coverage/coverage-summary.json
          readme-file-path: /tmp/test-readme.md
          commit: 'false'

      - name: Verify all five badges were inserted
        run: |
          echo "--- README after action ---"
          cat /tmp/test-readme.md
          echo "--- end README ---"
          grep -Fq "prefix=\$coverage\$"   /tmp/test-readme.md
          grep -Fq "prefix=\$statements\$" /tmp/test-readme.md
          grep -Fq "prefix=\$branches\$"   /tmp/test-readme.md
          grep -Fq "prefix=\$functions\$"  /tmp/test-readme.md
          grep -Fq "prefix=\$lines\$"      /tmp/test-readme.md
          echo "All badges inserted (istanbul)"

  # lcov (Go / Ruby / C/C++ / Python with lcov reporter)
  test-lcov:
    name: 'lcov — Go / Ruby / C++'
    runs-on: ubuntu-latest
