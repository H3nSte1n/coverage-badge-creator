<style>
:root {
  --accent: #83A603;
  --accent-ink: #2c3a00;
  --accent-soft: #eef2dc;
  --bg: #faf8f2;
  --paper: #fffdf6;
  --ink: #1a1a18;
  --ink-soft: #5a5a55;
  --rule: #e8e4d8;
  --code-bg: #1c1d1a;
  --code-ink: #e9e7df;
  --radius: 12px;
  --radius-sm: 8px;
  --space: 1;
  --font-display: 'Instrument Serif', 'Iowan Old Style', Georgia, serif;
  --font-body: 'Geist', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  --shadow-sm: 0 1px 0 rgba(0,0,0,.04), 0 4px 14px -8px rgba(0,0,0,.15);
  --shadow-md: 0 2px 0 rgba(0,0,0,.04), 0 18px 40px -20px rgba(0,0,0,.25);
}
html.dark {
  --bg: #14140f;
  --paper: #1c1c17;
  --ink: #f1ede1;
  --ink-soft: #9d9a8e;
  --rule: #2a2a23;
  --accent-soft: #2a3010;
  --code-bg: #0f0f0c;
  --code-ink: #e9e7df;
  --shadow-sm: 0 1px 0 rgba(0,0,0,.4), 0 4px 14px -8px rgba(0,0,0,.5);
  --shadow-md: 0 2px 0 rgba(0,0,0,.4), 0 18px 40px -20px rgba(0,0,0,.6);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
  line-height: 1.55;
}
a { color: inherit; }
code { font-family: var(--font-mono); font-size: .92em; }
em { font-family: var(--font-display); font-style: italic; font-weight: 400; }
::selection { background: var(--accent); color: white; }

/* ─── Layout ───────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 1fr;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 calc(28px * var(--space));
}
.layout {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  gap: 64px;
  padding-top: 24px;
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; gap: 0; }
  .toc { display: none; }
}

/* ─── Top nav ──────────────────────────────────────────── */
.topnav {
  position: sticky;
  top: 0;
  z-index: 30;
  background: color-mix(in oklab, var(--bg) 85%, transparent);
  backdrop-filter: saturate(1.2) blur(10px);
  -webkit-backdrop-filter: saturate(1.2) blur(10px);
  border-bottom: 1px solid var(--rule);
}
.topnav-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  font-weight: 600;
}
.brand-name { font-family: var(--font-mono); font-size: 14px; letter-spacing: -.01em; font-weight: 600; }
.topnav-links { display: flex; align-items: center; gap: 20px; font-size: 14px; }
.topnav-links a { text-decoration: none; color: var(--ink-soft); transition: color .15s; }
.topnav-links a:hover { color: var(--ink); }
.topnav-gh { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--rule); border-radius: 999px; color: var(--ink) !important; }
.topnav-gh:hover { background: var(--paper); }
.iconbtn { background: none; border: 1px solid var(--rule); border-radius: 999px; width: 32px; height: 32px; display: grid; place-items: center; color: var(--ink); cursor: pointer; transition: background .15s; }
.iconbtn:hover { background: var(--paper); }
@media (max-width: 720px) {
  .topnav-links a:not(.topnav-gh) { display: none; }
}

/* ─── Hero ─────────────────────────────────────────────── */
.hero {
  padding: 60px 0 80px;
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.4fr);
  gap: 56px;
  align-items: center;
}
@media (max-width: 980px) {
  .hero { grid-template-columns: 1fr; gap: 40px; padding: 40px 0 56px; }
}
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--accent-soft);
  color: var(--accent-ink);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
html.dark .eyebrow { color: #c9d97a; }
.hero-title {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(44px, 7vw, 78px);
  line-height: 1.02;
  letter-spacing: -.02em;
  margin: 0 0 22px;
  text-wrap: balance;
}
.hero-title em { color: var(--accent); }
.hero-sub {
  font-size: 18px;
  color: var(--ink-soft);
  max-width: 48ch;
  margin: 0 0 28px;
}
.hero-sub code {
  background: var(--accent-soft);
  color: var(--accent-ink);
  padding: 2px 6px;
  border-radius: 4px;
}
html.dark .hero-sub code { color: #d4e386; }
.hero-cta { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-bottom: 24px; }
.ghost-btn {
  color: var(--ink);
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
  padding: 10px 4px;
  border-bottom: 1px solid currentColor;
  transition: color .15s;
}
.ghost-btn:hover { color: var(--accent); }
.hero-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; font-size: 14px; color: var(--ink-soft); }
.hero-meta .counter { font-family: var(--font-display); font-size: 22px; color: var(--accent); font-style: italic; font-weight: 400; }
.hero-meta .dot { color: var(--rule); }

/* ─── Hero demo (before/after) ─────────────────────────── */
.hero-demo {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 18px;
  position: relative;
}
.hero-arrow {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--ink-soft);
}
.arrow-label { font-family: var(--font-mono); font-size: 10px; color: var(--accent); }
.readme-card {
  background: var(--paper);
  border-radius: var(--radius);
  border: 1px solid var(--rule);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  transition: transform .4s cubic-bezier(.2,.7,.3,1), box-shadow .4s, border-color .3s;
  transform: rotate(-1.2deg);
}
.readme-card.tone-after { transform: rotate(1.2deg); }
.readme-card.is-on { border-color: var(--accent); }
.readme-chrome {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 12px;
  background: color-mix(in oklab, var(--bg) 60%, var(--paper));
  border-bottom: 1px solid var(--rule);
}
.chrome-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.chrome-tab { margin-left: 10px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); }
.readme-body { padding: 20px 22px 24px; min-height: 240px; }
.md-h1 { font-family: var(--font-display); font-size: 28px; line-height: 1; margin-bottom: 14px; }
.md-h2 { font-family: var(--font-display); font-size: 18px; line-height: 1; margin: 18px 0 8px; color: var(--ink-soft); }
.md-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; min-height: 28px; }
.md-fade { opacity: .9; }
.md-img-ph {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 18px;
  background: repeating-linear-gradient(45deg, var(--rule), var(--rule) 3px, transparent 3px, transparent 6px);
  border-radius: 3px;
  font-family: var(--font-mono); font-size: 9px; color: var(--ink-soft);
}
.md-token {
  background: var(--accent-soft);
  color: var(--accent-ink);
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  border: 1px dashed var(--accent);
}
html.dark .md-token { color: #d4e386; }
.md-token.pulse { animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(131,166,3,.4); }
  50% { box-shadow: 0 0 0 8px rgba(131,166,3,0); }
}
.md-badge-wrap { display: inline-flex; }
.md-badge-wrap.pop { animation: pop .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes pop {
  0% { transform: scale(.6); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.md-line { height: 8px; background: var(--rule); border-radius: 4px; margin: 8px 0; }
.md-line.w-100 { width: 100%; }
.md-line.w-80 { width: 80%; }
.md-line.w-60 { width: 60%; }

@media (max-width: 980px) {
  .hero-demo { grid-template-columns: 1fr; }
  .hero-arrow { transform: rotate(90deg); }
  .readme-card { transform: rotate(0); }
}

/* ─── Sections ─────────────────────────────────────────── */
.section { padding: calc(64px * var(--space)) 0; border-top: 1px solid var(--rule); }
.section-head { margin-bottom: 40px; max-width: 60ch; }
.section-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--accent);
}
.section-title {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(32px, 4.4vw, 48px);
  line-height: 1.05;
  letter-spacing: -.01em;
  margin: 8px 0 0;
  text-wrap: balance;
}
.section-body { display: grid; gap: 24px; }
.section-lede { font-size: 17px; color: var(--ink-soft); max-width: 60ch; margin: 0 0 12px; }
.section-lede code { background: var(--paper); border: 1px solid var(--rule); padding: 1px 6px; border-radius: 4px; }

/* ─── TOC ──────────────────────────────────────────────── */
.toc {
  position: sticky;
  top: 88px;
  align-self: start;
  font-size: 14px;
  padding: 16px 0;
}
.toc-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--ink-soft);
  margin-bottom: 12px;
}
.toc ul { list-style: none; padding: 0; margin: 0; border-left: 1px solid var(--rule); }
.toc li { position: relative; }
.toc li a {
  display: block;
  padding: 6px 12px;
  text-decoration: none;
  color: var(--ink-soft);
  margin-left: -1px;
  border-left: 1px solid transparent;
  transition: color .15s, border-color .15s, padding .2s;
}
.toc li.on a { color: var(--accent); border-left-color: var(--accent); padding-left: 16px; }
.toc li a:hover { color: var(--ink); }

/* ─── Copy button ──────────────────────────────────────── */
.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--code-bg);
  color: var(--code-ink);
  border: 1px solid color-mix(in oklab, var(--code-bg), white 10%);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 12.5px;
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .12s;
}
.copy-btn:hover { background: color-mix(in oklab, var(--code-bg), white 6%); }
.copy-btn:active { transform: scale(.98); }
.copy-btn.copied { border-color: var(--accent); color: var(--accent); }
.copy-btn.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); padding: 12px 16px; font-size: 13px; }
html.dark .copy-btn.primary { background: var(--accent); color: #14140f; border-color: var(--accent); }
.copy-label { white-space: nowrap; }

/* ─── Code block ───────────────────────────────────────── */
.codeblock { background: var(--code-bg); color: var(--code-ink); border-radius: var(--radius); overflow: hidden; }
.codeblock-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 8px 8px 14px;
  border-bottom: 1px solid color-mix(in oklab, var(--code-bg), white 8%);
}
.codeblock-head .copy-btn { padding: 4px 10px; font-size: 11px; }
.codeblock-tabs { display: flex; gap: 4px; }
.codeblock-tabs .tab {
  background: transparent;
  border: 0;
  color: color-mix(in oklab, var(--code-ink), var(--code-bg) 50%);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.codeblock-tabs .tab.on { background: color-mix(in oklab, var(--code-bg), white 8%); color: var(--code-ink); }
.codeblock-tabs .tab:hover:not(.on) { color: var(--code-ink); }
.codeblock .code {
  margin: 0;
  padding: 16px 18px 18px;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.55;
  white-space: pre-wrap;
  overflow-x: auto;
}
.tk-key { color: #c4d77e; }
.tk-str { color: #e6c074; }
.tk-num { color: #f48a8a; }
.tk-cmd { color: #87c5ff; font-weight: 600; }
.tk-flag { color: #d3b3ff; }
.tk-heading { color: #c4d77e; }
.tk-comment { color: #7a8270; font-style: italic; }

/* ─── Hero language rotor ──────────────────────────────── */
.hero-title-sub {
  display: block;
  font-family: var(--font-display);
  font-style: italic;
  color: var(--ink-soft);
  font-size: .7em;
  line-height: 1;
  margin-top: 6px;
}
.lang-rotor {
  display: inline-block;
  position: relative;
  min-width: 4.5ch;
  text-align: left;
}
.lang-rotor em {
  color: var(--accent);
  display: inline-block;
  animation: langSwap .45s cubic-bezier(.2,.7,.3,1);
}
@keyframes langSwap {
  0% { opacity: 0; transform: translateY(.18em) rotate(-2deg); }
  100% { opacity: 1; transform: translateY(0) rotate(0); }
}

/* ─── Path toggle (Action vs npm) ──────────────────────── */
.path-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 8px;
}
.path-toggle button {
  display: grid;
  grid-template-columns: auto 1fr;
  grid-template-rows: auto auto;
  column-gap: 14px;
  row-gap: 2px;
  align-items: center;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  color: var(--ink);
  transition: border-color .15s, box-shadow .15s, transform .15s;
}
.path-toggle button:hover { border-color: var(--accent); }
.path-toggle button.on {
  border-color: var(--accent);
  background: var(--accent-soft);
  box-shadow: var(--shadow-sm);
}
.path-tag {
  grid-row: 1 / span 2;
  width: 36px; height: 36px;
  display: grid; place-items: center;
  background: var(--ink);
  color: var(--bg);
  border-radius: 8px;
  font-family: var(--font-display);
  font-style: italic;
  font-size: 22px;
  line-height: 1;
}
.path-toggle button.on .path-tag { background: var(--accent); color: white; }
.path-toggle button > span:nth-child(2) {
  font-family: var(--font-display);
  font-size: 22px;
  line-height: 1.1;
  font-weight: 400;
  align-self: end;
}
.path-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: .03em;
  align-self: start;
}

/* ─── Language shell ───────────────────────────────────── */
.lang-shell {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
}
.lang-tabs {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--rule);
  background: color-mix(in oklab, var(--bg) 50%, var(--paper));
}
.lang-tab {
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--rule);
  padding: 14px 16px;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  display: grid;
  gap: 2px;
  color: var(--ink);
  transition: background .15s, color .15s;
}
.lang-tab:last-child { border-bottom: 0; }
.lang-tab:hover { background: var(--accent-soft); }
.lang-tab.on { background: var(--paper); }
.lang-tab.on .lang-tab-name { color: var(--accent); }
.lang-tab-name { font-family: var(--font-display); font-size: 18px; line-height: 1; }
.lang-tab-fmt { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-soft); letter-spacing: .02em; }
.lang-body { padding: 20px; display: grid; gap: 18px; align-content: start; }
.lang-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.lang-meta > div { display: grid; gap: 4px; }
.lang-meta-k { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); }
.lang-meta-v { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--accent); }
.lang-meta-v code { color: var(--accent); }
.lang-meta-v small { font-family: var(--font-body); margin-left: 6px; color: var(--ink-soft); font-weight: 400; font-size: 12px; }

/* ─── Action inputs table ──────────────────────────────── */
.action-table {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
}
.action-row {
  display: grid;
  grid-template-columns: 200px 1fr 220px;
  gap: 16px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--rule);
  font-size: 14px;
  align-items: center;
}
.action-row:last-child { border-bottom: 0; }
.action-head {
  background: color-mix(in oklab, var(--bg) 50%, var(--paper));
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.action-row code { background: var(--bg); border: 1px solid var(--rule); padding: 1px 6px; border-radius: 4px; color: var(--accent); font-size: 12.5px; }
.action-head code { background: transparent; border: 0; color: inherit; padding: 0; }

/* ─── Format table (in config card) ────────────────────── */
.format-table { border: 1px solid var(--rule); border-radius: var(--radius-sm); overflow: hidden; }
.format-row {
  display: grid;
  grid-template-columns: 140px 1fr 200px;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--rule);
  font-size: 13px;
  align-items: center;
}
.format-row:last-child { border-bottom: 0; }
.format-head {
  background: color-mix(in oklab, var(--bg) 50%, var(--paper));
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.format-row code { background: var(--bg); border: 1px solid var(--rule); padding: 1px 6px; border-radius: 4px; color: var(--accent); font-size: 12px; }
.format-row code em { font-style: normal; font-family: var(--font-mono); }
.format-head code { background: transparent; border: 0; color: inherit; padding: 0; }
.format-row span:last-child code { color: var(--ink); font-size: 11.5px; }

/* ─── Quickstart steps ─────────────────────────────────── */
.steps { display: grid; gap: 28px; }
.step {
  display: grid;
  grid-template-columns: 56px minmax(0, 1fr);
  gap: 18px;
  align-items: start;
}
.step-n {
  font-family: var(--font-display);
  font-size: 56px;
  line-height: .9;
  color: var(--accent);
  font-style: italic;
}
.step-title { font-family: var(--font-display); font-size: 28px; line-height: 1.1; margin: 0 0 8px; font-weight: 400; }
.step-body p { color: var(--ink-soft); margin: 0 0 14px; }
.step-body code { background: var(--paper); border: 1px solid var(--rule); padding: 1px 6px; border-radius: 4px; }
.tokens { display: flex; flex-wrap: wrap; gap: 8px; }
.token-chip {
  background: var(--paper);
  border: 1px solid var(--rule);
  padding: 6px 12px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 13px;
  transition: border-color .15s, background .15s, transform .15s;
  cursor: default;
}
.token-chip:hover { border-color: var(--accent); background: var(--accent-soft); transform: translateY(-2px); }
html.dark .token-chip:hover { color: #d4e386; }

/* ─── Usage / keys ─────────────────────────────────────── */
.keys-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 18px; }
.key-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 20px;
  transition: border-color .15s, transform .15s, box-shadow .2s;
}
.key-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.key-name { display: inline-block; font-family: var(--font-mono); font-size: 14px; color: var(--accent); margin-bottom: 8px; font-weight: 600; }
.key-desc { color: var(--ink-soft); font-size: 14px; margin: 0 0 14px; }
.key-preview { padding-top: 12px; border-top: 1px solid var(--rule); overflow-x: auto; }
.callout {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 18px 20px;
  background: var(--accent-soft);
  color: var(--accent-ink);
  border-radius: var(--radius);
  border-left: 3px solid var(--accent);
}
html.dark .callout { color: #d4e386; }
.callout svg { color: var(--accent); flex-shrink: 0; margin-top: 2px; }
.callout code { background: rgba(0,0,0,.06); padding: 1px 6px; border-radius: 4px; }
html.dark .callout code { background: rgba(255,255,255,.08); }

/* ─── Playground ───────────────────────────────────────── */
.playground {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
}
@media (max-width: 760px) { .playground { grid-template-columns: 1fr; } }
.play-controls {
  padding: 24px;
  border-right: 1px solid var(--rule);
  display: grid;
  gap: 18px;
}
@media (max-width: 760px) { .play-controls { border-right: none; border-bottom: 1px solid var(--rule); } }
.field { display: grid; gap: 8px; }
.field > span {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--ink-soft);
}
.field input[type="text"], .field input:not([type]) {
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.seg { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 3px; background: var(--bg); border: 1px solid var(--rule); border-radius: var(--radius-sm); }
.seg button {
  text-align: center;
  background: transparent;
  border: 0;
  border-radius: 5px;
  padding: 7px 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background .15s, color .15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.seg button.on { background: var(--accent); color: white; }
/* native color input inside hue reel */
input[type="color"] { appearance: none; -webkit-appearance: none; cursor: pointer; }
.play-preview { display: flex; flex-direction: column; }
.play-stage {
  flex: 0 0 auto;
  padding: 48px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: auto;
  background:
    radial-gradient(circle at 1px 1px, var(--rule) 1px, transparent 0) 0 0 / 14px 14px,
    var(--paper);
  border-bottom: 1px solid var(--rule);
}
.play-snippets { display: grid; gap: 0; }
.play-snippets .codeblock { border-radius: 0; }
.play-snippets .codeblock + .codeblock { border-top: 1px solid color-mix(in oklab, var(--code-bg), white 8%); }

/* Fix: broad `code` selectors (step-body, section-lede) must not bleed into codeblocks */
.codeblock code { background: transparent; border: 0; padding: 0; border-radius: 0; }

/* ─── Config grid ──────────────────────────────────────── */
.config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 18px; }
.config-card {
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 24px;
  display: grid;
  gap: 14px;
  align-content: start;
}
.config-card h3 { font-family: var(--font-display); font-weight: 400; font-size: 24px; margin: 0; }
.cli-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.cli-table th, .cli-table td { padding: 10px 0; text-align: left; border-bottom: 1px solid var(--rule); }
.cli-table th { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-soft); font-weight: 600; }
.cli-table td code { background: var(--bg); border: 1px solid var(--rule); padding: 1px 6px; border-radius: 4px; }
.cli-table td:first-child { width: 30%; white-space: nowrap; }
.opt-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; font-size: 14px; }
.opt-list code { background: var(--bg); border: 1px solid var(--rule); padding: 2px 8px; border-radius: 4px; color: var(--accent); font-weight: 600; }
.muted { color: var(--ink-soft); }

/* ─── Built with ───────────────────────────────────────── */
.built-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
.built-card {
  display: grid;
  gap: 4px;
  padding: 20px;
  background: var(--paper);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
}
.built-k { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-soft); }
.built-v { font-family: var(--font-display); font-size: 24px; line-height: 1.1; }

/* ─── Contributing ─────────────────────────────────────── */
.contrib { list-style: none; padding: 0; margin: 0 0 16px; display: grid; gap: 10px; }
.contrib li { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: var(--paper); border: 1px solid var(--rule); border-radius: var(--radius-sm); }
.contrib-n { font-family: var(--font-display); font-style: italic; color: var(--accent); font-size: 24px; min-width: 24px; }
.contrib code { background: var(--bg); border: 1px solid var(--rule); padding: 1px 6px; border-radius: 4px; }

/* ─── FAQ ──────────────────────────────────────────────── */
.faq { display: grid; gap: 0; border-top: 1px solid var(--rule); }
.faq-item { border-bottom: 1px solid var(--rule); }
.faq-q {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 22px 4px;
  background: transparent;
  border: 0;
  cursor: pointer;
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  text-align: left;
  color: var(--ink);
}
.faq-toggle { font-family: var(--font-mono); font-size: 22px; color: var(--accent); transition: transform .2s; }
.faq-item.open .faq-toggle { transform: rotate(180deg); }
.faq-a { padding: 0 4px 22px; color: var(--ink-soft); max-width: 60ch; }

/* ─── Footer ───────────────────────────────────────────── */
.footer { border-top: 1px solid var(--rule); padding: 60px 0 80px; margin-top: 40px; }
.footer-inner { display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: start; }
@media (max-width: 700px) { .footer-inner { grid-template-columns: 1fr; } }
.footer-brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 13px; }
.footer-cols { display: grid; grid-template-columns: repeat(2, minmax(140px, 1fr)); gap: 40px; }
.footer-cols h4 { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-soft); margin: 0 0 12px; font-weight: 600; }
.footer-cols a { display: block; text-decoration: none; padding: 4px 0; font-size: 14px; color: var(--ink); }
.footer-cols a:hover { color: var(--accent); }
.footer-fine { grid-column: 1 / -1; color: var(--ink-soft); font-size: 13px; padding-top: 30px; border-top: 1px solid var(--rule); font-family: var(--font-mono); }

/* Tweaks panel needs to sit above sticky nav */
[data-tweaks-panel] { z-index: 100 !important; }

/* ─── Mobile ───────────────────────────────────────────── */
@media (max-width: 720px) {
  .app { padding: 0 18px; }
  .topnav-inner { padding: 12px 18px; gap: 8px; }
  .brand-name { font-size: 12.5px; }
  .topnav-gh span { display: none; }
  .topnav-gh { padding: 6px 10px; }
  .iconbtn { width: 30px; height: 30px; }

  .hero { padding: 32px 0 48px; gap: 32px; }
  .hero-title { font-size: 40px; line-height: 1.04; }
  .hero-sub { font-size: 16px; }
  .hero-cta { gap: 10px; }
  .hero-cta .copy-btn.primary {
    /* The npm install command is long — let it wrap and shrink on phones */
    font-size: 11.5px;
    padding: 10px 12px;
    width: 100%;
    word-break: break-all;
    text-align: left;
    line-height: 1.35;
  }
  .hero-cta .copy-btn.primary .copy-label { white-space: normal; }
  .hero-meta { font-size: 13px; gap: 6px; }
  .hero-meta .counter { font-size: 18px; }

  .hero-demo { gap: 14px; }
  .hero-arrow { transform: rotate(90deg); margin: 8px 0; }
  .readme-card { transform: rotate(0); }
  .readme-body { padding: 16px 18px 20px; min-height: 0; }
  .md-h1 { font-size: 22px; }
  .md-h2 { font-size: 16px; }

  .section { padding: 40px 0; }
  .section-head { margin-bottom: 24px; }
  .section-title { font-size: 30px; }

  .step { grid-template-columns: 1fr; gap: 10px; }
  .step-n { font-size: 44px; }
  .step-title { font-size: 22px; }

  .path-toggle { grid-template-columns: 1fr; gap: 8px; }
  .path-toggle button { padding: 14px 16px; }
  .lang-shell { grid-template-columns: 1fr; }
  .lang-tabs { flex-direction: row; overflow-x: auto; border-right: 0; border-bottom: 1px solid var(--rule); }
  .lang-tab { flex: 0 0 auto; border-bottom: 0; border-right: 1px solid var(--rule); padding: 10px 14px; }
  .lang-tab.on { background: var(--accent-soft); }
  .lang-meta { grid-template-columns: 1fr; gap: 8px; }
  .action-row { grid-template-columns: 1fr; gap: 2px; padding: 12px 14px; font-size: 13px; }
  .action-head { display: none; }
  .action-row > span:nth-child(3)::before { content: 'Default: '; font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-soft); display: block; margin-top: 4px; }
  .format-row { grid-template-columns: 1fr; gap: 4px; padding: 10px 12px; }
  .format-head { display: none; }

  .keys-grid { grid-template-columns: 1fr; gap: 12px; }
  .key-card { padding: 16px; }

  .playground { grid-template-columns: 1fr; }
  .play-controls { padding: 18px; gap: 14px; }
  .play-stage { padding: 28px 16px; }

  .config-grid { grid-template-columns: 1fr; gap: 12px; }
  .config-card { padding: 18px; }

  .built-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .built-card { padding: 14px; }
  .built-v { font-size: 18px; }

  .contrib li { padding: 12px 14px; gap: 10px; font-size: 14px; }
  .contrib-n { font-size: 20px; min-width: 18px; }

  .faq-q { font-size: 17px; padding: 18px 4px; gap: 12px; }
  .faq-a { font-size: 14px; }

  .footer { padding: 40px 0 60px; }
  .footer-inner { gap: 28px; }
  .footer-cols { gap: 24px; grid-template-columns: 1fr 1fr; }

  /* Tweaks panel — let it not occlude the screen on phones */
  [data-tweaks-panel] { right: 12px !important; left: 12px !important; max-width: none !important; }
}

@media (max-width: 460px) {
  .hero-title { font-size: 34px; }
  .section-title { font-size: 26px; }
  .built-grid { grid-template-columns: 1fr; }
  .footer-cols { grid-template-columns: 1fr; }
  .codeblock .code { font-size: 12px; padding: 14px; }
  .codeblock-tabs .tab { padding: 5px 8px; font-size: 11px; }
}
</style>
</head>
<body>
<div class="app">
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#83A603",
  "fontPair": "serif-display",
  "radius": 12,
  "density": "comfortable",
  "heroVariant": "before-after"
}/*EDITMODE-END*/;

const FONT_PAIRS = {
  'serif-display': { display: "'Instrument Serif', serif", body: "'Geist', system-ui, sans-serif" },
  'all-sans': { display: "'Geist', system-ui, sans-serif", body: "'Geist', system-ui, sans-serif" },
  'mono-display': { display: "'JetBrains Mono', monospace", body: "'Geist', system-ui, sans-serif" },
};

const DENSITY = { compact: 0.7, comfortable: 1, spacious: 1.3 };

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [darkMode, setDarkMode] = React.useState(false);

  React.useEffect(() => {
    document.documentElement.classList.toggle('dark', darkMode);
  }, [darkMode]);

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--accent', t.accent);
    r.style.setProperty('--radius', t.radius + 'px');
    r.style.setProperty('--radius-sm', Math.max(4, t.radius - 4) + 'px');
    r.style.setProperty('--space', DENSITY[t.density] || 1);
    const pair = FONT_PAIRS[t.fontPair] || FONT_PAIRS['serif-display'];
    r.style.setProperty('--font-display', pair.display);
    r.style.setProperty('--font-body', pair.body);
    r.style.setProperty('--accent-soft', `color-mix(in oklab, ${t.accent} 18%, transparent)`);
    r.style.setProperty('--accent-ink', `color-mix(in oklab, ${t.accent} 75%, #000 25%)`);
  }, [t]);

  return (
    <>
      <TopNav dark={darkMode} setDark={setDarkMode}/>
      <div className="layout">
        <TOC/>
        <div>
          <Hero/>
          <Quickstart/>
          <Languages/>
          <Usage/>
          <ActionRef/>
          <Playground/>
          <Config/>
          <Compatibility/>
          <Contributing/>
          <FAQ/>
          <Footer/>
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Color">
          <TweakColor label="Accent" value={t.accent}
            options={['#83A603', '#0ea5e9', '#a855f7', '#f97316', '#e11d48']}
            onChange={(v) => setTweak('accent', v)}/>
        </TweakSection>
        <TweakSection label="Type">
          <TweakRadio label="Pairing" value={t.fontPair}
            options={['serif-display', 'all-sans', 'mono-display']}
            onChange={(v) => setTweak('fontPair', v)}/>
        </TweakSection>
        <TweakSection label="Shape">
          <TweakSlider label="Radius" value={t.radius} min={0} max={24} step={2} unit="px"
            onChange={(v) => setTweak('radius', v)}/>
        </TweakSection>
        <TweakSection label="Layout">
          <TweakRadio label="Density" value={t.density}
            options={['compact', 'comfortable', 'spacious']}
            onChange={(v) => setTweak('density', v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
