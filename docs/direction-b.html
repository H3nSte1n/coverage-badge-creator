<style>
:root {
  --b-accent: #83A603;
  --b-accent-ink: #2c3a00;
  --b-bg: #fff8e7;
  --b-paper: #ffffff;
  --b-ink: #1a1815;
  --b-ink-soft: #6b6759;
  --b-rule: #ead9a5;
  --b-line: #1a1815;
  --b-code-bg: #1a1815;
  --b-code-ink: #f4eed7;
  --b-pink: #f4a3c0;
  --b-blue: #7cb6e8;
  --b-green: #b6d35c;
  --b-yellow: #f5d967;
  --b-orange: #ff8a47;
  --b-purple: #c69ce0;
  --b-radius: 16px;
  --b-radius-sm: 10px;
  --b-space: 1;
  --b-font-display: 'Bricolage Grotesque', system-ui, sans-serif;
  --b-font-body: 'Geist', system-ui, -apple-system, sans-serif;
  --b-font-script: 'Caveat', cursive;
  --b-font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --b-shadow-sticker: 2px 3px 0 rgba(26,24,21,.85), 4px 5px 0 rgba(26,24,21,.15);
  --b-shadow-pop: 4px 6px 0 var(--b-line);
}
html.dark {
  --b-bg: #16140e;
  --b-paper: #1f1d15;
  --b-ink: #f4eed7;
  --b-ink-soft: #a39d8c;
  --b-rule: #3a3527;
  --b-line: #f4eed7;
  --b-code-bg: #0d0c08;
  --b-shadow-sticker: 2px 3px 0 rgba(244,238,215,.6), 4px 5px 0 rgba(244,238,215,.1);
  --b-shadow-pop: 4px 6px 0 var(--b-line);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--b-bg); color: var(--b-ink); }
body {
  font-family: var(--b-font-body);
  -webkit-font-smoothing: antialiased;
  line-height: 1.55;
  overflow-x: hidden;
}
a { color: inherit; }
code { font-family: var(--b-font-mono); font-size: .92em; }
::selection { background: var(--b-accent); color: white; }

/* paper texture: subtle dotted bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 1px 1px, rgba(26,24,21,.06) 1px, transparent 0) 0 0 / 18px 18px;
  pointer-events: none;
  z-index: 0;
}
html.dark body::before {
  background: radial-gradient(circle at 1px 1px, rgba(244,238,215,.05) 1px, transparent 0) 0 0 / 18px 18px;
}

.b-app { position: relative; z-index: 1; }

/* ───────── Top nav ───────── */
.b-topnav {
  position: sticky;
  top: 16px;
  z-index: 30;
  margin: 16px auto 0;
  max-width: 1280px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.b-brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: 999px;
  padding: 8px 14px 8px 8px;
  box-shadow: var(--b-shadow-pop);
  font-weight: 600;
}
.b-brand-mark {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--b-accent);
  border: 1.5px solid var(--b-line);
  display: inline-block;
  position: relative;
}
.b-brand-mark::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 50%;
  background: var(--b-paper);
}
.b-brand-name { font-family: var(--b-font-mono); font-size: 13px; }
.b-nav-links {
  display: flex;
  align-items: center;
  gap: 4px;
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: 999px;
  padding: 6px;
  box-shadow: var(--b-shadow-pop);
}
.b-nav-links a {
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  transition: background .15s;
}
.b-nav-links a:hover { background: var(--b-accent); color: white; }
.b-nav-gh { display: inline-flex; align-items: center; gap: 6px; background: var(--b-line); color: var(--b-paper) !important; }
.b-nav-gh:hover { background: var(--b-accent) !important; }
.b-iconbtn {
  background: var(--b-paper); border: 1.5px solid var(--b-line); border-radius: 999px;
  width: 36px; height: 36px;
  display: grid; place-items: center;
  cursor: pointer;
  margin-left: 4px;
  box-shadow: var(--b-shadow-pop);
  transition: transform .15s;
  color: var(--b-ink);
}
.b-iconbtn:hover { transform: translate(-1px, -1px); box-shadow: 5px 7px 0 var(--b-line); }
@media (max-width: 820px) {
  .b-nav-links a:not(.b-nav-gh) { display: none; }
}

/* ───────── Hero ───────── */
.b-hero {
  position: relative;
  max-width: 1280px;
  margin: 0 auto;
  padding: 80px 28px 60px;
  min-height: 760px;
  overflow: hidden;
}
.b-sticker-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.b-sticker {
  position: absolute;
  filter: drop-shadow(2px 3px 0 rgba(26,24,21,.85)) drop-shadow(4px 5px 0 rgba(26,24,21,.12));
  animation: bobble 6s ease-in-out infinite;
  transform-origin: center;
  opacity: .92;
}
@keyframes bobble {
  0%, 100% { translate: 0 0; }
  50% { translate: 0 -6px; }
}
.b-hero-content { position: relative; z-index: 2; max-width: 880px; margin: 0 auto; text-align: center; }
.b-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--b-font-mono);
  font-size: 12px;
  letter-spacing: .05em;
  text-transform: uppercase;
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: 999px;
  padding: 8px 14px;
  margin-bottom: 28px;
  color: var(--b-ink);
  box-shadow: var(--b-shadow-pop);
}
.b-eyebrow svg { color: var(--b-accent); }
.b-h1 {
  font-family: var(--b-font-display);
  font-weight: 700;
  font-size: clamp(50px, 9vw, 104px);
  line-height: .9;
  letter-spacing: -.035em;
  margin: 0 0 24px;
  text-wrap: balance;
}
.b-h1-line { display: block; }
.b-h1-script {
  font-family: var(--b-font-script);
  font-weight: 700;
  font-size: .9em;
  color: var(--b-accent);
  letter-spacing: 0;
  transform: rotate(-2deg);
  display: inline-block;
  font-style: italic;
}
.b-lede {
  font-size: 19px;
  color: var(--b-ink-soft);
  max-width: 56ch;
  margin: 0 auto 32px;
}
.b-lede code {
  background: var(--b-accent);
  color: white;
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 500;
}

.b-counter {
  display: inline-flex;
  align-items: baseline;
  gap: 6px;
  background: var(--b-line);
  color: var(--b-paper);
  padding: 14px 22px 12px;
  border-radius: var(--b-radius);
  box-shadow: var(--b-shadow-pop);
  margin-bottom: 28px;
  font-family: var(--b-font-display);
  transform: rotate(-1.5deg);
}
.b-counter-num {
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -.04em;
  font-variant-numeric: tabular-nums;
  color: var(--b-accent);
}
.b-counter-pct { font-size: 32px; font-weight: 700; color: var(--b-accent); margin-right: 12px; }
.b-counter-cap { font-family: var(--b-font-mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; opacity: .8; }

.b-cta-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
  margin-bottom: 40px;
}
.b-copy {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius-sm);
  padding: 10px 14px;
  cursor: pointer;
  font-family: var(--b-font-mono);
  font-size: 13px;
  color: var(--b-ink);
  box-shadow: var(--b-shadow-pop);
  transition: transform .12s, box-shadow .12s, background .15s;
}
.b-copy.big { padding: 16px 22px; font-size: 14px; }
.b-copy:hover { transform: translate(-2px, -2px); box-shadow: 6px 8px 0 var(--b-line); }
.b-copy:active { transform: translate(0, 0); box-shadow: 2px 3px 0 var(--b-line); }
.b-copy.copied { background: var(--b-accent); color: white; }
.b-copy-text { font-family: var(--b-font-mono); }
.b-copy-icon { display: inline-flex; }

.b-ghost {
  font-family: var(--b-font-mono);
  text-decoration: none;
  font-weight: 600;
  font-size: 13px;
  color: var(--b-ink);
  padding: 8px 14px;
  border-bottom: 2px dashed var(--b-line);
}
.b-ghost:hover { color: var(--b-accent); }

.b-marquee {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px 12px;
  margin-bottom: 56px;
}
.b-marquee > * { filter: drop-shadow(2px 2px 0 rgba(26,24,21,.7)); }

/* ───────── Before/after readme frame ───────── */
.b-readme-frame {
  position: relative;
  z-index: 2;
  max-width: 720px;
  margin: 0 auto;
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius);
  box-shadow: 6px 8px 0 var(--b-line);
  overflow: hidden;
  transform: rotate(-.8deg);
}
.b-readme-tabs {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  border-bottom: 1.5px solid var(--b-line);
  background: var(--b-bg);
  font-family: var(--b-font-mono);
  font-size: 12px;
}
.b-readme-tab {
  padding: 4px 10px;
  border-radius: 5px;
  color: var(--b-ink-soft);
  transition: background .25s, color .25s;
}
.b-readme-tab.on { background: var(--b-line); color: var(--b-paper); }
.b-readme-cmd { margin-left: auto; color: var(--b-ink-soft); }
.b-readme-prompt { color: var(--b-accent); margin-right: 6px; font-weight: 600; }
.b-readme-card { padding: 24px 28px 28px; }
.b-readme-h1 { font-family: var(--b-font-display); font-size: 32px; font-weight: 700; margin-bottom: 14px; }
.b-readme-h2 { font-family: var(--b-font-display); font-size: 20px; font-weight: 600; margin: 18px 0 8px; color: var(--b-ink-soft); }
.b-readme-h2.mt-tight { margin-top: 14px; }
.b-readme-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; min-height: 28px; }
.b-readme-token {
  font-family: var(--b-font-mono);
  font-size: 13px;
  background: var(--b-accent);
  color: white;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1.5px dashed var(--b-line);
  font-weight: 500;
  animation: tokenPulse 1.8s ease-in-out infinite;
}
@keyframes tokenPulse {
  0%, 100% { transform: rotate(-2deg) scale(1); }
  50% { transform: rotate(-2deg) scale(1.04); }
}
.b-readme-badge { display: inline-flex; }
.b-readme-badge.pop { animation: bpop .55s cubic-bezier(.34,1.56,.64,1); }
@keyframes bpop {
  0% { transform: scale(.5) rotate(-12deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
.b-readme-line { height: 9px; background: var(--b-rule); border-radius: 5px; margin: 8px 0; }
.b-readme-line.w-full { width: 100%; } .b-readme-line.w-90 { width: 90%; } .b-readme-line.w-70 { width: 70%; } .b-readme-line.w-50 { width: 50%; }
.b-readme-code {
  font-family: var(--b-font-mono);
  font-size: 12px;
  background: var(--b-code-bg);
  color: var(--b-code-ink);
  padding: 10px 14px;
  border-radius: 8px;
  margin-top: 10px;
}

/* ───────── Layout shell ───────── */
.b-layout {
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  gap: 56px;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 28px;
  position: relative;
}
@media (max-width: 900px) {
  .b-layout { grid-template-columns: 1fr; gap: 0; }
  .b-toc { display: none; }
}

/* ───────── TOC ───────── */
.b-toc {
  position: sticky;
  top: 120px;
  align-self: start;
  padding-top: 72px;
}
.b-toc-label {
  font-family: var(--b-font-mono);
  font-size: 10px;
  letter-spacing: .15em;
  margin-bottom: 14px;
  color: var(--b-ink-soft);
}
.b-toc ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 4px; }
.b-toc li a {
  display: block;
  text-decoration: none;
  font-family: var(--b-font-mono);
  font-size: 12px;
  color: var(--b-ink-soft);
  padding: 6px 10px;
  border-radius: 999px;
  transition: background .15s, color .15s, transform .15s;
}
.b-toc li.on a { background: var(--b-line); color: var(--b-paper); transform: translateX(4px); }
.b-toc li a:hover { color: var(--b-ink); }

/* ───────── Sections ───────── */
.b-section { padding: calc(72px * var(--b-space)) 0; }
.b-section-head { margin-bottom: 40px; }
.b-section-eyebrow {
  display: inline-block;
  font-family: var(--b-font-mono);
  font-size: 11px;
  letter-spacing: .15em;
  text-transform: uppercase;
  background: var(--b-accent);
  color: white;
  padding: 4px 10px;
  border-radius: 999px;
  margin-bottom: 14px;
  transform: rotate(-1deg);
}
.b-section-title {
  font-family: var(--b-font-display);
  font-weight: 700;
  font-size: clamp(36px, 5vw, 60px);
  line-height: 1;
  letter-spacing: -.025em;
  margin: 0;
  text-wrap: balance;
}
.b-section-body { display: grid; gap: 24px; }
.b-lede-section { font-size: 18px; color: var(--b-ink-soft); max-width: 60ch; margin: 0 0 12px; }
.b-lede-section code, .b-lede-section em { background: var(--b-paper); border: 1.5px solid var(--b-line); padding: 1px 6px; border-radius: 5px; font-style: normal; }

/* ───────── Code blocks ───────── */
.b-codeblock {
  background: var(--b-code-bg);
  color: var(--b-code-ink);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius-sm);
  overflow: hidden;
  box-shadow: var(--b-shadow-pop);
}
.b-codeblock-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 8px 8px 14px;
  background: color-mix(in oklab, var(--b-code-bg), white 6%);
}
.b-tabs { display: flex; gap: 2px; }
.b-tab {
  background: transparent;
  border: 0;
  font-family: var(--b-font-mono);
  font-size: 11.5px;
  padding: 5px 12px;
  border-radius: 5px;
  color: color-mix(in oklab, var(--b-code-ink), var(--b-code-bg) 50%);
  cursor: pointer;
}
.b-tab.on { background: var(--b-accent); color: white; }
.b-codeblock-head .b-copy {
  background: transparent;
  color: var(--b-code-ink);
  border: 1px solid color-mix(in oklab, var(--b-code-ink), transparent 70%);
  padding: 4px 8px;
  box-shadow: none;
}
.b-codeblock-head .b-copy:hover { background: color-mix(in oklab, var(--b-code-bg), white 10%); transform: none; box-shadow: none; }
.b-code {
  margin: 0;
  padding: 16px 18px;
  font-family: var(--b-font-mono);
  font-size: 13px;
  line-height: 1.55;
  overflow-x: auto;
  white-space: pre;
}
.btk-key { color: #e6d067; }
.btk-str { color: #b6d35c; }
.btk-num { color: #f4a3c0; }
.btk-cmd { color: #7cb6e8; font-weight: 700; }
.btk-flag { color: #c69ce0; }

/* ───────── Quickstart steps ───────── */
.b-steps { display: grid; gap: 28px; }
.b-step {
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius);
  padding: 28px;
  box-shadow: var(--b-shadow-pop);
  position: relative;
  display: grid;
  grid-template-columns: 220px minmax(0, 1fr);
  gap: 28px;
  align-items: start;
}
@media (max-width: 720px) { .b-step { grid-template-columns: 1fr; } }
.b-step-tag {
  position: relative;
}
.b-step-n {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--b-font-display);
  font-weight: 700;
  font-size: 80px;
  line-height: 1;
  background: var(--step-color);
  color: var(--b-line);
  width: 110px;
  height: 110px;
  border-radius: var(--b-radius);
  border: 1.5px solid var(--b-line);
  box-shadow: var(--b-shadow-pop);
  transform: rotate(-3deg);
  margin-bottom: 16px;
}
.b-step-title { font-family: var(--b-font-display); font-size: 24px; font-weight: 700; margin: 0; line-height: 1.1; }
.b-step-body p { color: var(--b-ink-soft); margin: 0 0 16px; }
.b-step-body code, .b-step-body em { background: var(--b-bg); border: 1.5px solid var(--b-rule); padding: 1px 6px; border-radius: 5px; font-style: normal; }
.b-chips { display: flex; flex-wrap: wrap; gap: 10px; }
.b-chip {
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  padding: 8px 14px;
  border-radius: 999px;
  font-family: var(--b-font-mono);
  font-size: 13px;
  box-shadow: 3px 4px 0 var(--b-line);
  transform: rotate(calc(var(--c-i, 0) * 1deg - 2deg));
  transition: transform .15s, box-shadow .15s;
  cursor: default;
}
.b-chip:hover { transform: translate(-2px, -2px) rotate(0); box-shadow: 5px 6px 0 var(--b-accent); border-color: var(--b-accent); }

/* ───────── Tokens / keys ───────── */
.b-keys { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; }
.b-key {
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius);
  padding: 22px;
  box-shadow: var(--b-shadow-pop);
  display: grid;
  gap: 10px;
  align-content: start;
  transform: rotate(calc(var(--i, 0) * 1deg - 1deg));
  transition: transform .2s, box-shadow .2s;
  position: relative;
  overflow: hidden;
}
.b-key::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 8px;
  background: var(--c);
  border-bottom: 1.5px solid var(--b-line);
}
.b-key:hover { transform: translate(-2px, -2px) rotate(0); box-shadow: 6px 8px 0 var(--c); }
.b-key-token {
  font-family: var(--b-font-mono);
  font-size: 16px;
  font-weight: 600;
  color: var(--b-ink);
  margin-top: 10px;
}
.b-key-desc { font-size: 14px; color: var(--b-ink-soft); margin: 0; }
.b-key-preview { padding-top: 12px; border-top: 1.5px dashed var(--b-rule); }
.b-callout {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 18px 22px;
  background: var(--b-line);
  color: var(--b-paper);
  border-radius: var(--b-radius);
  box-shadow: var(--b-shadow-pop);
}
.b-callout-ico { font-size: 22px; }
.b-callout code { background: rgba(255,255,255,.15); padding: 1px 6px; border-radius: 4px; }
.b-callout strong { color: var(--b-accent); }

/* ───────── Playground ───────── */
.b-play {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
  gap: 20px;
}
@media (max-width: 820px) { .b-play { grid-template-columns: 1fr; } }
.b-play-stage {
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius);
  box-shadow: var(--b-shadow-pop);
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  min-height: 360px;
  background-image:
    radial-gradient(circle at 1px 1px, var(--b-rule) 1px, transparent 0);
  background-size: 16px 16px;
}
.b-play-frame {
  display: grid;
  place-items: center;
  padding: 32px;
  background: var(--b-paper);
  border: 1.5px dashed var(--b-line);
  border-radius: 12px;
  min-width: 280px;
}
.b-play-strip { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
.b-play-controls {
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius);
  box-shadow: var(--b-shadow-pop);
  padding: 24px;
  display: grid;
  gap: 16px;
}
.b-field { display: grid; gap: 8px; }
.b-field > label {
  font-family: var(--b-font-mono);
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--b-ink-soft);
}
.b-field input:not([type="color"]) {
  background: var(--b-bg);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius-sm);
  padding: 10px 12px;
  font-family: var(--b-font-mono);
  font-size: 13px;
  color: var(--b-ink);
  outline: none;
}
.b-field input:focus { background: var(--b-paper); }
.b-seg { display: flex; flex-wrap: wrap; gap: 4px; }
.b-seg button {
  flex: 0 1 auto;
  background: var(--b-bg);
  border: 1.5px solid var(--b-line);
  padding: 6px 10px;
  border-radius: 999px;
  font-family: var(--b-font-mono);
  font-size: 11px;
  cursor: pointer;
  color: var(--b-ink);
}
.b-seg button.on { background: var(--b-accent); color: white; }
.b-swatches { display: flex; flex-wrap: wrap; gap: 8px; }
.b-swatch { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--b-line); cursor: pointer; padding: 0; }
.b-swatch.on { box-shadow: 0 0 0 2px var(--b-paper), 0 0 0 4px var(--b-line); }
.b-swatch-pick { width: 28px; height: 28px; border-radius: 50%; border: 1.5px dashed var(--b-line); background: transparent; cursor: pointer; padding: 0; }
.b-play-snippets { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 820px) { .b-play-snippets { grid-template-columns: 1fr; } }

/* ───────── Config ───────── */
.b-config { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 20px; }
.b-config-card {
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius);
  padding: 24px;
  box-shadow: var(--b-shadow-pop);
  display: grid;
  gap: 12px;
}
.b-config-card h3 { font-family: var(--b-font-display); font-weight: 700; font-size: 22px; margin: 0; line-height: 1.1; }
.b-config-card p { margin: 0; color: var(--b-ink-soft); font-size: 14px; }
.b-config-card code { background: var(--b-bg); border: 1.5px solid var(--b-rule); padding: 1px 6px; border-radius: 4px; }
.b-cli-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.b-cli-table td { padding: 10px 0; border-bottom: 1.5px dashed var(--b-rule); }
.b-cli-table td:first-child { width: 38%; white-space: nowrap; }
.b-opts { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; font-size: 14px; color: var(--b-ink-soft); }
.b-opts li { padding: 8px 0; border-bottom: 1.5px dashed var(--b-rule); }
.b-opts li:last-child { border-bottom: 0; }
.b-opts code { color: var(--b-accent); font-weight: 600; }

/* ───────── Stack ───────── */
.b-stack { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
.b-stack-card {
  display: grid;
  gap: 6px;
  padding: 20px;
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius);
  box-shadow: var(--b-shadow-pop);
}
.b-stack-card span { font-family: var(--b-font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--b-ink-soft); }
.b-stack-card strong { font-family: var(--b-font-display); font-size: 26px; font-weight: 700; }

/* ───────── Contributing ───────── */
.b-contrib { list-style: none; padding: 0; margin: 0 0 14px; display: grid; gap: 10px; }
.b-contrib li {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius-sm);
  box-shadow: var(--b-shadow-pop);
  font-size: 15px;
}
.b-contrib li span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--b-accent);
  color: white;
  font-family: var(--b-font-display);
  font-weight: 700;
  flex-shrink: 0;
}
.b-contrib li code { background: var(--b-bg); border: 1.5px solid var(--b-rule); padding: 1px 6px; border-radius: 4px; }
.b-muted { color: var(--b-ink-soft); font-size: 14px; }
.b-muted a { font-weight: 600; }

/* ───────── FAQ ───────── */
.b-faq { display: grid; gap: 10px; }
.b-faq-item {
  background: var(--b-paper);
  border: 1.5px solid var(--b-line);
  border-radius: var(--b-radius-sm);
  box-shadow: var(--b-shadow-pop);
  overflow: hidden;
}
.b-faq-q {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
  background: transparent;
  border: 0;
  cursor: pointer;
  text-align: left;
  font-family: var(--b-font-display);
  font-size: 19px;
  font-weight: 600;
  color: var(--b-ink);
}
.b-faq-qmark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  background: var(--b-accent);
  color: white;
  border-radius: 50%;
  font-family: var(--b-font-display);
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}
.b-faq-text { flex: 1; }
.b-faq-tog { font-family: var(--b-font-mono); font-size: 20px; color: var(--b-accent); }
.b-faq-a { padding: 0 20px 18px 62px; color: var(--b-ink-soft); font-family: var(--b-font-body); font-size: 15px; max-width: 60ch; }

/* ───────── Footer ───────── */
.b-footer { padding: 60px 28px 80px; max-width: 1280px; margin: 40px auto 0; border-top: 1.5px dashed var(--b-line); }
.b-footer-stack { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; margin-bottom: 28px; }
.b-footer-stack > * { filter: drop-shadow(2px 3px 0 rgba(26,24,21,.7)); transform: rotate(calc(-2deg + var(--i, 0) * 2deg)); }
.b-footer-line {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  font-family: var(--b-font-mono);
  font-size: 12px;
  color: var(--b-ink-soft);
}
.b-footer-line a { font-weight: 600; }
.b-footer-line a:hover { color: var(--b-accent); }

/* Tweaks panel on top */
[data-tweaks-panel] { z-index: 100 !important; }

/* ───────── Mobile ───────── */
@media (max-width: 820px) {
  .b-topnav { top: 12px; padding: 0 14px; gap: 8px; }
  .b-brand { padding: 6px 12px 6px 6px; gap: 8px; }
  .b-brand-name { font-size: 12px; }
  .b-nav-links { padding: 5px; }
  .b-nav-gh span { display: none; }
  .b-nav-gh { padding: 6px 10px; }
  .b-iconbtn { width: 32px; height: 32px; }
}

@media (max-width: 720px) {
  .b-hero { padding: 56px 18px 40px; min-height: 0; }
  .b-h1 { font-size: 44px; line-height: .95; }
  .b-h1-script { font-size: .82em; }
  .b-lede { font-size: 15.5px; margin-bottom: 24px; }
  .b-sticker-layer { opacity: .35; }
  .b-counter { padding: 10px 16px 8px; margin-bottom: 20px; }
  .b-counter-num { font-size: 40px; }
  .b-counter-pct { font-size: 24px; margin-right: 8px; }
  .b-counter-cap { font-size: 10px; }
  .b-cta-row { gap: 12px; margin-bottom: 28px; }
  .b-copy.big { width: 100%; padding: 12px 14px; font-size: 11.5px; text-align: left; word-break: break-all; line-height: 1.4; }
  .b-copy.big .b-copy-text { white-space: normal; }
  .b-marquee { gap: 6px 8px; margin-bottom: 32px; }
  .b-readme-frame { transform: rotate(0); }
  .b-readme-card { padding: 18px 18px 22px; }
  .b-readme-h1 { font-size: 22px; }
  .b-readme-h2 { font-size: 16px; }
  .b-readme-cmd { display: none; }
  .b-layout { padding: 0 18px; gap: 0; }
  .b-section { padding: 48px 0; }
  .b-section-head { margin-bottom: 24px; }
  .b-section-title { font-size: 32px; }
  .b-lede-section { font-size: 15.5px; }
  .b-step { grid-template-columns: 1fr; gap: 12px; padding: 20px; }
  .b-step-n { font-size: 56px; width: 84px; height: 84px; }
  .b-step-title { font-size: 20px; }
  .b-keys { grid-template-columns: 1fr; gap: 14px; }
  .b-key { transform: rotate(0); padding: 18px; }
  .b-play { grid-template-columns: 1fr; gap: 14px; }
  .b-play-stage { padding: 20px; min-height: 220px; }
  .b-play-frame { padding: 18px; min-width: 0; }
  .b-play-controls { padding: 18px; }
  .b-play-snippets { grid-template-columns: 1fr; gap: 12px; }
  .b-config { grid-template-columns: 1fr; gap: 14px; }
  .b-config-card { padding: 18px; }
  .b-config-card h3 { font-size: 19px; }
  .b-stack { grid-template-columns: 1fr 1fr; gap: 10px; }
  .b-stack-card { padding: 14px; }
  .b-stack-card strong { font-size: 20px; }
  .b-contrib li { padding: 12px 14px; gap: 12px; font-size: 14px; }
  .b-contrib li span { width: 26px; height: 26px; font-size: 14px; }
  .b-faq-q { padding: 14px 16px; font-size: 16px; gap: 10px; }
  .b-faq-qmark { width: 24px; height: 24px; font-size: 14px; }
  .b-faq-a { padding: 0 16px 16px 50px; font-size: 14px; }
  .b-footer { padding: 40px 18px 60px; }
  .b-footer-stack { gap: 10px; margin-bottom: 20px; }
  .b-footer-line { flex-direction: column; gap: 6px; align-items: center; text-align: center; }
  [data-tweaks-panel] { right: 12px !important; left: 12px !important; max-width: none !important; }
}

@media (max-width: 460px) {
  .b-h1 { font-size: 36px; }
  .b-section-title { font-size: 26px; }
  .b-stack { grid-template-columns: 1fr; }
  .b-code { font-size: 12px; padding: 14px; }
  .b-tab { padding: 4px 8px; font-size: 11px; }
}
</style>
</head>
<body>
<div class="b-app">
  <div id="root"></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="badge.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="b-components.jsx"></script>

<script type="text/babel">
const B_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#83A603",
  "fontPair": "bricolage-script",
  "radius": 16,
  "density": "comfortable",
  "heroVariant": "stickers"
}/*EDITMODE-END*/;

const B_FONT_PAIRS = {
  'bricolage-script': { display: "'Bricolage Grotesque', system-ui, sans-serif", body: "'Geist', system-ui, sans-serif", script: "'Caveat', cursive" },
  'mono-display': { display: "'JetBrains Mono', monospace", body: "'Geist', system-ui, sans-serif", script: "'Caveat', cursive" },
  'all-sans': { display: "'Geist', system-ui, sans-serif", body: "'Geist', system-ui, sans-serif", script: "'Geist', system-ui, sans-serif" },
};
const B_DENSITY = { compact: 0.7, comfortable: 1, spacious: 1.3 };

function BApp() {
  const [t, setTweak] = useTweaks(B_DEFAULTS);
  const [dark, setDark] = React.useState(false);

  React.useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--b-accent', t.accent);
    r.style.setProperty('--b-radius', t.radius + 'px');
    r.style.setProperty('--b-radius-sm', Math.max(4, t.radius - 6) + 'px');
    r.style.setProperty('--b-space', B_DENSITY[t.density] || 1);
    const pair = B_FONT_PAIRS[t.fontPair] || B_FONT_PAIRS['bricolage-script'];
    r.style.setProperty('--b-font-display', pair.display);
    r.style.setProperty('--b-font-body', pair.body);
    r.style.setProperty('--b-font-script', pair.script);
    r.style.setProperty('--b-accent-ink', `color-mix(in oklab, ${t.accent} 75%, #000 25%)`);
  }, [t]);

  return (
    <>
      <BTopNav dark={dark} setDark={setDark}/>
      <BHero/>
      <div className="b-layout">
        <BTOC/>
        <div>
          <BQuickstart/>
          <BUsage/>
          <BPlayground/>
          <BConfig/>
          <BBuiltWith/>
          <BContributing/>
          <BFAQ/>
        </div>
      </div>
      <BFooter/>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Color">
          <TweakColor label="Accent" value={t.accent}
            options={['#83A603', '#0ea5e9', '#e11d48', '#f97316', '#a855f7']}
            onChange={(v) => setTweak('accent', v)}/>
        </TweakSection>
        <TweakSection label="Type">
          <TweakRadio label="Pairing" value={t.fontPair}
            options={['bricolage-script', 'mono-display', 'all-sans']}
            onChange={(v) => setTweak('fontPair', v)}/>
        </TweakSection>
        <TweakSection label="Shape">
          <TweakSlider label="Radius" value={t.radius} min={0} max={28} step={2} unit="px"
            onChange={(v) => setTweak('radius', v)}/>
        </TweakSection>
        <TweakSection label="Layout">
          <TweakRadio label="Density" value={t.density}
            options={['compact', 'comfortable', 'spacious']}
            onChange={(v) => setTweak('density', v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BApp/>);
</script>

<style id="__om-edit-overrides"></style>
</body>
</html>
